<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;

        }
        .item {
            background-color: lightgreen;
            color: white;
            font-size: 2em;
            align-items: center;
            align-content: center;
            text-align: center;
        }
        #item-1 {
        
            grid-row: 1 / 13;
        }
        #item-2 {
            grid-row: 1 / 7;
        }
        #item-3 {
            grid-row: 7 / 13;
        }
        #item-4 {
            grid-row: 1 / 5;
        }
        #item-5 {
            grid-row: 5 / 9;
        }
        #item-6 {
            grid-row: 9 / 13;
        }
        #item-7 {
            grid-row: 1 / 4;
        }
        #item-8 {
            grid-row: 4 / 7;
        }
        #item-9 {
            grid-row: 7 / 10;
        }
        #item-10 {
            grid-row: 10 / 13;
        }
        #item-11 {
            grid-row: 1 / 3;
        }
        #item-12 {
            grid-row: 3 / 5;
        }
        #item-13 {
            grid-row: 5 / 7;
        }
        #item-14 {
            grid-row: 7 / 9;
        }
        #item-15 {
            grid-row: 9 / 11;
        }
        #item-16 {
            grid-row: 11 / 13;
        }
        
     
    </style>
</head>
<body>
        <div class="container">
        <div class="item" id="item-1">Dabba-1</div>
        <div class="item" id="item-2">Dabba-2</div>
        <div class="item" id="item-3">Dabba-3</div>
        <div class="item" id="item-4">Dabba-4</div>
        <div class="item" id="item-5">Dabba-5</div>
        <div class="item" id="item-6">Dabba-6</div>
        <div class="item" id="item-7">Dabba-7</div>
        <div class="item" id="item-8">Dabba-8</div>
        <div class="item" id="item-9">Dabba-9</div>
        <div class="item" id="item-10">Dabba-10</div>
        <div class="item" id="item-11">Dabba-11</div>
        <div class="item" id="item-12">Dabba-12</div>
        <div class="item" id="item-13">Dabba-13</div>
        <div class="item" id="item-14">Dabba-14</div>
        <div class="item" id="item-15">Dabba-15</div>
        <div class="item" id="item-16">Dabba-16</div>
        <div class="item" id="item-17">Dabba-17</div>
        <div class="item" id="item-18">Dabba-18</div>
        <div class="item" id="item-19">Dabba-19</div>
        <div class="item" id="item-20">Dabba-20</div>
        <div class="item" id="item-21">Dabba-21</div>
        <div class="item" id="item-22">Dabba-22</div>
        <div class="item" id="item-23">Dabba-23</div>
        <div class="item" id="item-24">Dabba-24</div>
        <div class="item" id="item-25">Dabba-25</div>
        <div class="item" id="item-26">Dabba-26</div>
        <div class="item" id="item-27">Dabba-27</div>
        <div class="item" id="item-28">Dabba-28</div>
    </div>    
</body>
</html>
