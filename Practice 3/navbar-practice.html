<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Practice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', Times, serif;
        }
        .navbar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: black;
            align-items: center;
            padding: 10px ;
        }
        .logo .label {
            
            color: white;
            font-size: 24px;
            font-weight: bold;
            align-items: center;
            padding: 10px;
            
        }
        .nav-list ul li {
            list-style: none;
            display: inline-block;
            /* gap: 100px; */
            justify-content: space-between;
            align-items: center;
        }
        .nav-list ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }
        .nav-list ul li:hover {
            background-color: #474747;
            padding: 1px 10px;
            border-radius: 50%;
        }
        .nav-end {
            display: flex;
            border-radius: 20px;
            gap: 20px;
            align-items: center;
        }
         .nav-end .serach{
             padding: 10px 10px;
             border-radius: 20px;
             position: absolute;
             right: 0;
             border: none;
             background-color:gray;
             color: white;
        }
        .nav-end .sign-in {
            position: static;
            padding: 10px 10px;
            border-radius: 20px;
            border: none;
            background-color: gray;
        }
         .nav-end .search-nav {
             display: flex;
             gap: 10px;
         }
         .nav-end .search-nav input {
             padding: 10px 10px;
             border-radius: 20px;
             border: none;
         }
    </style>
</head>
<body>
    
    <div class="navbar">
        <div class="logo">
            <label class="label">Krunal</label>
        </div>
        <div class="nav-list">
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">Service</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Contact</a></li>
            </ul>
        </div>
    
        <div class="nav-end">
            <div class="search-nav">
                <input type="text" placeholder="Search...">
                <button class="search"><i class="fa-solid fa-magnifying-glass"></i></button>
            
            <button class="sign-in">SignIn</button>
            </div>
        </div>
    </div>
</body>
</html>
